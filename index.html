<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>AI Chat</title>

<style>
body {
  background: black;
  color: #00ff00;
  font-family: monospace;
  text-align: center;
}

#chatBox {
  width: 80%;
  max-width: 600px;
  height: 300px;
  margin: 20px auto;
  border: 1px solid #00ff00;
  padding: 10px;
  overflow-y: auto;
}

input {
  width: 70%;
  padding: 10px;
  background: black;
  color: #00ff00;
  border: 1px solid #00ff00;
}

button {
  padding: 10px;
  background: black;
  color: #00ff00;
  border: 1px solid #00ff00;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>AI Chat</h1>

<div id="chatBox"></div>

<input type="text" id="userInput" placeholder="כתוב הודעה...">
<button onclick="sendMessage()">שלח</button>

<script>
async function sendMessage() {
  let input = document.getElementById("userInput").value;
  let chatBox = document.getElementById("chatBox");

  if (!input) return;

  chatBox.innerHTML += "<p>> " + input + "</p>";

  // ניקוי טקסט (חשוב מאוד)
  let clean = input.replace(/\s/g, "").toLowerCase();

  // בדיקה חזקה יותר
  if (
    clean.includes("איךאתה") ||
    clean.includes("מהשלומך") ||
    clean.includes("מהקורה") ||
    clean.includes("מהנשמע")
  ) {
    chatBox.innerHTML += "<p style='color:lightgreen'>אני בסדר איך אפשר לעזור לך היום</p>";
  } else {
    chatBox.innerHTML += "<p style='color:lightgreen'>לא הבנתי 🤖</p>";
  }

  document.getElementById("userInput").value = "";
  chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
