<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>AI Chat Pro</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  background: #020617;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

#chatBox {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.message {
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
  max-width: 70%;
}

.user {
  background: #2563eb;
  margin-left: auto;
  text-align: right;
}

.bot {
  background: #334155;
  margin-right: auto;
}

#inputArea {
  display: flex;
  padding: 10px;
  background: #020617;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 5px;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  border: none;
  background: #22c55e;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>AI Chat Pro 🤖</header>

<div id="chatBox"></div>

<div id="inputArea">
  <input type="text" id="userInput" placeholder="כתוב הודעה...">
  <button onclick="sendMessage()">שלח</button>
</div>

<script>
async function sendMessage() {
  const inputEl = document.getElementById("userInput");
  const chatBox = document.getElementById("chatBox");

  let input = inputEl.value.trim();
  if (!input) return;

  // הצגת הודעת משתמש
  chatBox.innerHTML += `<div class="message user">${input}</div>`;
  inputEl.value = "";

  // הודעת טעינה
  let loadingMsg = document.createElement("div");
  loadingMsg.className = "message bot";
  loadingMsg.innerText = "...כותב תשובה";
  chatBox.appendChild(loadingMsg);

  chatBox.scrollTop = chatBox.scrollHeight;

  try {
    const response = await fetch("https://api.allorigins.win/raw?url=https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill", {
      method: "POST",
      headers: {
        "Authorization": "Bearer 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",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        inputs: input
      })
    });

    const data = await response.json();

    let reply = "אין תשובה כרגע";

    if (data.error) {
      reply = "שגיאה: " + data.error;
    } else if (Array.isArray(data) && data[0]?.generated_text) {
      reply = data[0].generated_text;
    }

    loadingMsg.innerText = reply;

  } catch (err) {
    loadingMsg.innerText = "❌ שגיאת חיבור";
  }

  chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
