<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>AI Bot</title>

<style>
body {
  background: black;
  color: #00ff00;
  font-family: monospace;
  text-align: center;
}

#chatBox {
  width: 80%;
  max-width: 600px;
  height: 300px;
  margin: 20px auto;
  border: 1px solid #00ff00;
  padding: 10px;
  overflow-y: auto;
}

input {
  width: 70%;
  padding: 10px;
  background: black;
  color: #00ff00;
  border: 1px solid #00ff00;
}

button {
  padding: 10px;
  background: black;
  color: #00ff00;
  border: 1px solid #00ff00;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>AI Bot</h1>

<div id="chatBox"></div>

<input type="text" id="userInput" placeholder="כתוב הודעה...">
<button onclick="sendMessage()">שלח</button>

<script>
function sendMessage() {
  let input = document.getElementById("userInput").value.toLowerCase();
  let chatBox = document.getElementById("chatBox");

  if (!input) return;

  chatBox.innerHTML += "<p>> " + input + "</p>";

  let reply = "לא הבנתי 🤖";

  if (input.includes("שלום")) reply = "שלום 👋";
  else if (input.includes("מה אתה")) reply = "אני בוט שעונה על שאלות בסיסיות";
  else if (input.includes("מה שלומך")) reply = "אני עובד תקין 👍";
  else if (input.includes("תודה")) reply = "בשמחה 😊";
  else if (input.includes("עזרה")) reply = "שאל אותי כל דבר ואני אנסה לעזור";

  chatBox.innerHTML += "<p style='color:lightgreen'>" + reply + "</p>";

  document.getElementById("userInput").value = "";
  chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
